<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Remsdigi - SMM Panel & Social Media Booster</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body {
            background-color: #0f172a;
            color: #e2e8f0;
        }
        .neon-border:focus {
            border-color: #06b6d4;
            box-shadow: 0 0 10px #06b6d4;
        }
    </style>
</head>
<body class="font-sans antialiased min-h-screen flex flex-col justify-between">

    <nav class="border-b border-gray-800 bg-slate-900/50 backdrop-blur px-6 py-4 flex justify-between items-center sticky top-0 z-50">
        <div class="text-2xl font-bold tracking-wider text-cyan-400">
            REMS<span class="text-white">DIGI</span>
        </div>
        <div class="text-sm text-gray-400 hidden sm:block">
            <i class="fa-solid fa-globe text-cyan-400 mr-1"></i> remsdigi.my.id
        </div>
    </nav>

    <main class="flex-grow p-4 md:p-8 max-w-4xl mx-auto w-full">
        <div class="bg-slate-950 p-6 md:p-8 rounded-2xl border border-gray-800 shadow-2xl">
            <h2 class="text-xl md:text-2xl font-semibold mb-6 text-center text-white">
                <i class="fa-solid fa-rocket text-cyan-400 mr-2"></i>Order Social Media Services
            </h2>

            <form id="orderForm" class="space-y-6">
                <div>
                    <label class="block text-sm font-medium text-gray-400 mb-2">1. Pilih Platform / Kategori</label>
                    <select id="categorySelect" class="w-full p-3 bg-slate-900 border border-gray-700 rounded-lg text-white focus:outline-none neon-border transition">
                        <option value="">-- Pilih Kategori --</option>
                        <option value="tiktok">TikTok</option>
                        <option value="instagram">Instagram</option>
                        <option value="youtube">YouTube</option>
                    </select>
                </div>

                <div>
                    <label class="block text-sm font-medium text-gray-400 mb-2">2. Pilih Tipe Layanan</label>
                    <select id="typeSelect" class="w-full p-3 bg-slate-900 border border-gray-700 rounded-lg text-white focus:outline-none neon-border transition" disabled>
                        <option value="">-- Pilih Tipe --</option>
                    </select>
                </div>

                <div>
                    <label class="block text-sm font-medium text-gray-400 mb-2">3. Pilih Varian Layanan</label>
                    <select id="serviceSelect" class="w-full p-3 bg-slate-900 border border-gray-700 rounded-lg text-white text-sm focus:outline-none neon-border transition" disabled>
                        <option value="">-- Pilih Varian --</option>
                    </select>
                    <p id="serviceDesc" class="mt-2 text-xs text-cyan-400 hidden"></p>
                </div>

                <div>
                    <label class="block text-sm font-medium text-gray-400 mb-2">4. Target / Link URL</label>
                    <input type="text" id="targetInput" placeholder="Masukkan link profile atau link video" class="w-full p-3 bg-slate-900 border border-gray-700 rounded-lg text-white focus:outline-none neon-border transition" required>
                </div>

                <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                    <div>
                        <label class="block text-sm font-medium text-gray-400 mb-2">5. Jumlah Pesanan</label>
                        <input type="number" id="quantityInput" placeholder="Contoh: 1000" class="w-full p-3 bg-slate-900 border border-gray-700 rounded-lg text-white focus:outline-none neon-border transition" disabled required>
                        <span id="quantityLimit" class="text-xs text-gray-500 mt-1 block"></span>
                    </div>
                    
                    <div class="bg-slate-900 p-4 rounded-lg border border-gray-800 flex flex-col justify-center">
                        <span class="text-xs text-gray-400 uppercase tracking-wider">Total Harga</span>
                        <span id="totalPrice" class="text-2xl font-bold text-emerald-400 mt-1">Rp 0</span>
                    </div>
                </div>

                <button type="submit" id="submitBtn" class="w-full py-4 bg-cyan-600 hover:bg-cyan-500 text-white font-semibold rounded-lg shadow-lg hover:shadow-cyan-500/20 transition duration-300 disabled:opacity-50 disabled:cursor-not-allowed">
                    <i class="fa-solid fa-cart-shopping mr-2"></i> Kirim Pesanan
                </button>
            </form>
        </div>
    </main>

    <footer class="border-t border-gray-800 bg-slate-950 p-4 text-center text-sm text-gray-500">
        &copy; 2026 <span class="text-cyan-400 font-semibold">Remsdigi</span>. All rights reserved.
    </footer>

    <script src="script.js"></script>
</body>
</html>
