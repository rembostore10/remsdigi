<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RemsDigi - Premium Digital Store</title>
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Google Fonts & FontAwesome -->
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; }
    </style>
</head>
<body class="bg-slate-900 text-white min-h-screen flex flex-col justify-between">

    <!-- NAVIGATION -->
    <nav class="border-b border-slate-800 bg-slate-900/80 backdrop-blur-md sticky top-0 z-40">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 h-16 flex items-center justify-between">
            <div class="flex items-center gap-2">
                <i class="fa-solid fa-cubes text-indigo-500 text-2xl"></i>
                <span class="text-xl font-bold tracking-wider bg-gradient-to-r from-indigo-400 to-purple-500 bg-clip-text text-transparent">RemsDigi</span>
            </div>
            <div class="flex items-center gap-4">
                <a href="https://wa.me/6281234567890" target="_blank" class="bg-indigo-600 hover:bg-indigo-700 text-white px-4 py-2 rounded-xl text-sm font-medium transition flex items-center gap-2 shadow-lg shadow-indigo-600/20">
                    <i class="fa-brands fa-whatsapp text-lg"></i> Hubungi Kami
                </a>
            </div>
        </div>
    </nav>

    <!-- HERO SECTION -->
    <header class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 pt-12 pb-8 text-center">
        <h1 class="text-4xl sm:text-5xl font-extrabold text-white tracking-tight mb-4">
            Layanan & Produk <span class="bg-gradient-to-r from-indigo-400 to-purple-500 bg-clip-text text-transparent">Digital Premium</span>
        </h1>
        <p class="max-w-2xl mx-auto text-slate-400 text-base sm:text-lg">
            Tingkatkan performa media sosial dan kebutuhan digital Anda dengan produk terbaik, proses cepat, dan harga yang bersahabat.
        </p>
    </header>

    <!-- MAIN CONTENT -->
    <main class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-6 flex-grow w-full">
        
        <!-- CATEGORY FILTER -->
        <div class="flex flex-wrap justify-center gap-2 mb-10" id="category-container">
            <button onclick="filterCategory('all')" class="cat-btn active bg-indigo-600 text-white px-5 py-2.5 rounded-xl text-sm font-medium transition">Semua</button>
            <button onclick="filterCategory('SMM')" class="cat-btn bg-slate-800 text-slate-300 hover:bg-slate-700 px-5 py-2.5 rounded-xl text-sm font-medium transition">Social Media</button>
            <button onclick="filterCategory('Premium')" class="cat-btn bg-slate-800 text-slate-300 hover:bg-slate-700 px-5 py-2.5 rounded-xl text-sm font-medium transition">Akun Premium</button>
            <button onclick="filterCategory('Desain')" class="cat-btn bg-slate-800 text-slate-300 hover:bg-slate-700 px-5 py-2.5 rounded-xl text-sm font-medium transition">Template Desain</button>
        </div>

        <!-- PRODUCTS GRID -->
        <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-6" id="products-grid">
            <!-- Rendered by JavaScript -->
        </div>
    </main>

    <!-- MODAL ORDER -->
    <div id="order-modal" class="fixed inset-0 bg-black/70 backdrop-blur-sm z-50 flex items-center justify-center hidden p-4">
        <div class="bg-slate-800 border border-slate-700 rounded-2xl max-w-md w-full overflow-hidden shadow-2xl transform transition-all scale-95 opacity-0 duration-300" id="modal-content">
            <div class="px-6 py-4 border-b border-slate-700 flex justify-between items-center bg-slate-850">
                <h3 class="text-lg font-bold text-white flex items-center gap-2">
                    <i class="fa-solid fa-shopping-bag text-indigo-400"></i> Detail Pemesanan
                </h3>
                <button onclick="closeModal()" class="text-slate-400 hover:text-white transition">
                    <i class="fa-solid fa-xmark text-xl"></i>
                </button>
            </div>
            <form id="order-form" onsubmit="handleOrder(event)" class="p-6 space-y-4">
                <input type="hidden" id="modal-product-id">
                
                <div>
                    <label class="block text-xs font-semibold uppercase tracking-wider text-slate-400 mb-1">Produk Pilihan</label>
                    <input type="text" id="modal-product-name" readonly class="w-full bg-slate-900 border border-slate-700 rounded-xl px-4 py-2.5 text-white font-medium focus:outline-none">
                </div>
                <div>
                    <label class="block text-xs font-semibold uppercase tracking-wider text-slate-400 mb-1">Harga</label>
                    <input type="text" id="modal-product-price" readonly class="w-full bg-slate-900 border border-slate-700 rounded-xl px-4 py-2.5 text-emerald-400 font-bold focus:outline-none">
                </div>
                <div>
                    <label class="block text-xs font-semibold uppercase tracking-wider text-slate-400 mb-1">Target / Username / Email</label>
                    <input type="text" id="order-target" required placeholder="Contoh: @username atau email anda" class="w-full bg-slate-950 border border-slate-700 rounded-xl px-4 py-2.5 text-white placeholder-slate-500 focus:outline-none focus:border-indigo-500 transition">
                </div>
                <div>
                    <label class="block text-xs font-semibold uppercase tracking-wider text-slate-400 mb-1">Metode Pembayaran Utama</label>
                    <select id="order-payment" class="w-full bg-slate-950 border border-slate-700 rounded-xl px-4 py-2.5 text-white focus:outline-none focus:border-indigo-500 transition">
                        <option value="QRIS / E-Wallet">QRIS / E-Wallet (Dana/OVO/Gopay)</option>
                        <option value="Transfer Bank">Transfer Bank (BCA/Mandiri)</option>
                    </select>
                </div>
                
                <button type="submit" class="w-full bg-emerald-600 hover:bg-emerald-700 text-white font-semibold py-3 rounded-xl transition flex items-center justify-center gap-2 shadow-lg shadow-emerald-600/20 mt-2">
                    <i class="fa-brands fa-whatsapp text-lg"></i> Kirim Pesanan via WhatsApp
                </button>
            </form>
        </div>
    </div>

    <!-- FOOTER -->
    <footer class="border-t border-slate-800 bg-slate-950 py-6 mt-12 text-center text-sm text-slate-500">
        <p>&copy; 2026 <span class="text-slate-400 font-medium">RemsDigi</span>. All rights reserved.</p>
    </footer>

    <!-- JAVASCRIPT LOGIC -->
    <script>
        // Nomor WhatsApp Admin (Ganti dengan nomor Anda, pastikan gunakan kode negara seperti 62)
        const WHATSAPP_NUMBER = "6281234567890";

        // Data Produk Mock
        const products = [
            { id: 1, name: "1,000 Followers Instagram", category: "SMM", price: "Rp 25.000", desc: "Proses cepat, akun bergaransi, meningkatkan engagment profile.", icon: "fa-instagram text-pink-500" },
            { id: 2, name: "Netflix Premium 1 Bulan", category: "Premium", price: "Rp 35.000", desc: "4K UHD, Akun privat/sharing legal, anti-on hold.", icon: "fa-netflix text-red-500" },
            { id: 3, name: "Canva Pro 1 Tahun (Invite)", category: "Premium", price: "Rp 40.000", desc: "Akses penuh fitur premium dengan email pribadi Anda.", icon: "fa-crown text-amber-400" },
            { id: 4, name: "1,000 Jam Tayang YouTube", category: "SMM", price: "Rp 120.000", desc: "Sangat aman untuk optimasi monetisasi channel Anda.", icon: "fa-youtube text-red-600" },
            { id: 5, name: "Template UI/UX Dashboard Tailwind", category: "Desain", price: "Rp 75.000", desc: "File lengkap HTML & Vue, responsif dan siap pakai.", icon: "fa-code text-indigo-400" },
            { id: 6, name: "Paket Feed Instagram Elegan", category: "Desain", price: "Rp 50.000", desc: "30+ Desain template Canva siap edit untuk bisnis online.", icon: "fa-palette text-purple-400" }
        ];

        // Render Produk ke Grid
        function renderProducts(filter = 'all') {
            const grid = document.getElementById('products-grid');
            grid.innerHTML = '';

            const filtered = filter === 'all' ? products : products.filter(p => p.category === filter);

            filtered.forEach(p => {
                grid.innerHTML += `
                    <div class="bg-slate-800/50 border border-slate-800 rounded-2xl p-6 flex flex-col justify-between hover:border-slate-700 transition-all duration-300 hover:-translate-y-1">
                        <div>
                            <div class="w-12 h-12 rounded-xl bg-slate-900 flex items-center justify-center mb-4 border border-slate-800">
                                <i class="fa-brands ${p.icon.includes('fa-') ? p.icon : 'fa-solid ' + p.icon} text-2xl"></i>
                            </div>
                            <span class="inline-block text-[10px] uppercase font-bold tracking-wider text-indigo-400 bg-indigo-500/10 px-2.5 py-1 rounded-md mb-2">${p.category}</span>
                            <h3 class="text-lg font-bold text-white mb-2">${p.name}</h3>
                            <p class="text-sm text-slate-400 line-clamp-2 mb-4">${p.desc}</p>
                        </div>
                        <div>
                            <div class="text-xl font-extrabold text-emerald-400 mb-4">${p.price}</div>
                            <button onclick="openModal(${p.id})" class="w-full bg-slate-900 hover:bg-indigo-600 hover:text-white text-slate-300 border border-slate-700 hover:border-indigo-600 text-sm font-semibold py-3 rounded-xl transition-all duration-200">
                                Beli Sekarang
                            </button>
                        </div>
                    </div>
                `;
            });
        }

        // Filter Kategori Visual
        function filterCategory(category) {
            renderProducts(category);
            const buttons = document.querySelectorAll('.cat-btn');
            buttons.forEach(btn => {
                btn.classList.remove('bg-indigo-600', 'text-white', 'active');
                btn.classList.add('bg-slate-800', 'text-slate-300');
            });
            event.target.classList.add('bg-indigo-600', 'text-white', 'active');
            event.target.classList.remove('bg-slate-800', 'text-slate-300');
        }

        // Modal Handler
        function openModal(id) {
            const product = products.find(p => p.id === id);
            if (!product) return;

            document.getElementById('modal-product-id').value = product.id;
            document.getElementById('modal-product-name').value = product.name;
            document.getElementById('modal-product-price').value = product.price;
            document.getElementById('order-target').value = '';

            const modal = document.getElementById('order-modal');
            const content = document.getElementById('modal-content');
            
            modal.classList.remove('hidden');
            setTimeout(() => {
                content.classList.remove('scale-95', 'opacity-0');
                content.classList.add('scale-100', 'opacity-100');
            }, 10);
        }

        function closeModal() {
            const modal = document.getElementById('order-modal');
            const content = document.getElementById('modal-content');
            
            content.classList.add('scale-95', 'opacity-0');
            content.classList.remove('scale-100', 'opacity-100');
            setTimeout(() => {
                modal.classList.add('hidden');
            }, 300);
        }

        // Proses Submit Formulir WhatsApp
        function handleOrder(e) {
            e.preventDefault();
            const name = document.getElementById('modal-product-name').value;
            const price = document.getElementById('modal-product-price').value;
            const target = document.getElementById('order-target').value;
            const payment = document.getElementById('order-payment').value;

            const text = `Halo RemsDigi, saya ingin membeli produk digital berikut:\n\n` +
                         `*Produk:* ${name}\n` +
                         `*Harga:* ${price}\n` +
                         `*Target/Data:* ${target}\n` +
                         `*Pembayaran:* ${payment}\n\n` +
                         `Mohon instruksi selanjutnya untuk penyelesaian transaksi. Terima kasih!`;

            const encodedText = encodeURIComponent(text);
            window.open(`https://wa.me/${WHATSAPP_NUMBER}?text=${encodedText}`, '_blank');
            closeModal();
        }

        // Inisialisasi Pertama Kali
        window.onload = () => {
            renderProducts();
        };
    </script>
</body>
</html>
