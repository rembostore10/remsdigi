<!doctype html>
<html lang="id" class="h-full">
 <head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Rembo Digital Store</title>
  <script src="https://cdn.tailwindcss.com/3.4.17"></script>
  <script src="https://cdn.jsdelivr.net/npm/lucide@0.263.0/dist/umd/lucide.min.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          fontFamily: {
            heading: ['Plus Jakarta Sans', 'sans-serif'],
            body: ['DM Sans', 'sans-serif']
          }
        }
      }
    }
  </script>
  <style>
    html, body { height: 100%; margin: 0; }
    .fade-up { animation: fadeUp 0.4s ease forwards; }
    @keyframes fadeUp { from { opacity:0; transform:translateY(12px); } to { opacity:1; transform:translateY(0); } }
    .spinner { animation: spin 0.6s linear infinite; border: 3px solid #e5e7eb; border-top-color: #10b981; border-radius: 50%; width: 20px; height: 20px; }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
 </head>
 <body class="h-full bg-gray-100 dark:bg-gray-950 font-body text-gray-800 dark:text-gray-200 transition-colors duration-300">
  <div id="app" class="h-full flex overflow-hidden">
   <div id="mobileOverlay" class="fixed inset-0 bg-black/40 z-40 hidden lg:hidden" onclick="toggleSidebar()"></div>
   
   <aside id="sidebar" class="fixed lg:static z-50 h-full w-64 bg-white dark:bg-gray-900 border-r border-gray-200 dark:border-gray-800 flex flex-col transform -translate-x-full lg:translate-x-0 transition-transform duration-300">
    <div class="p-5 border-b border-gray-200 dark:border-gray-800 flex items-center gap-3">
     <div class="w-9 h-9 rounded-xl bg-gradient-to-br from-emerald-400 to-emerald-600 flex items-center justify-center text-white font-heading font-bold text-sm">R</div>
     <span id="sidebarBrand" class="font-heading font-bold text-lg text-gray-900 dark:text-white">Remstore</span>
    </div>
    <nav class="flex-1 overflow-y-auto p-3 space-y-1" id="sidebarNav"></nav>
    <div class="p-4 border-t border-gray-200 dark:border-gray-800">
      <button onclick="toggleDark()" class="w-full flex items-center gap-3 px-3 py-2.5 rounded-xl text-sm text-gray-600 dark:text-gray-400 hover:bg-gray-100 dark:hover:bg-gray-800 transition-colors"> 
        <i data-lucide="moon" class="w-4 h-4 dark:hidden"></i>
        <i data-lucide="sun" class="w-4 h-4 hidden dark:block"></i> 
        <span>Mode Tampilan</span>
      </button>
    </div>
   </aside>

   <div class="flex-1 flex flex-col h-full overflow-hidden">
    <header class="flex items-center justify-between px-4 lg:px-6 py-3 bg-white dark:bg-gray-900 border-b border-gray-200 dark:border-gray-800 shrink-0">
     <div class="flex items-center gap-3">
      <button onclick="toggleSidebar()" class="lg:hidden p-2 rounded-xl hover:bg-gray-100 dark:hover:bg-gray-800"><i data-lucide="menu" class="w-5 h-5"></i></button>
      <h1 id="pageTitle" class="font-heading font-bold text-lg text-gray-900 dark:text-white">Dashboard</h1>
     </div>
     <div class="flex items-center gap-2">
      <span id="balanceDisplay" class="text-sm font-semibold text-emerald-600 bg-emerald-50 dark:bg-emerald-900/30 px-3 py-1.5 rounded-full">Rp 0</span>
      <div class="w-8 h-8 rounded-full bg-gray-300 dark:bg-gray-700 flex items-center justify-center"><i data-lucide="user" class="w-4 h-4"></i></div>
     </div>
    </header>
    <main id="mainContent" class="flex-1 overflow-y-auto p-4 lg:p-6"></main>
   </div>
  </div>

  <div id="toastContainer" class="fixed bottom-4 right-4 z-[100] space-y-2"></div>

  <script>
// --- State & Data ---
let orders = [];
let currentPage = 'dashboard';
let darkMode = false;
let selectedPlatform = null;
let activeTab = 'umum';
let sidebarOpen = false;

const platforms = [
  { id:'instagram', name:'Instagram', icon:'📷' },
  { id:'tiktok', name:'TikTok', icon:'🎵' },
  { id:'telegram', name:'Telegram', icon:'✈️' },
  { id:'youtube', name:'YouTube', icon:'▶️' }
];

const services = {
  instagram: [
    { id:'ig1', cat:'Followers', name:'Instagram Followers [HQ]', min:100, max:50000, price:15000 },
    { id:'ig2', cat:'Likes', name:'Instagram Likes [Real]', min:50, max:20000, price:8000 }
  ],
  tiktok: [
    { id:'tt1', cat:'Followers', name:'TikTok Followers', min:100, max:100000, price:12000 },
    { id:'tt2', cat:'Views', name:'TikTok Views', min:1000, max:5000000, price:2000 }
  ]
};

const menuItems = [
  { id:'dashboard', label:'Dashboard', icon:'layout-dashboard' },
  { id:'new-order', label:'Pesanan Baru', icon:'shopping-cart' },
  { id:'order-history', label:'Riwayat Pesanan', icon:'history' },
  { id:'deposit', label:'Deposit / Isi Saldo', icon:'wallet' }
];

// --- Core Functions ---
function toggleSidebar() {
  sidebarOpen = !sidebarOpen;
  const sb = document.getElementById('sidebar');
  sb.classList.toggle('-translate-x-full', !sidebarOpen);
  document.getElementById('mobileOverlay').classList.toggle('hidden', !sidebarOpen);
}

function toggleDark() {
  darkMode = !darkMode;
  document.documentElement.classList.toggle('dark', darkMode);
}

function navigateTo(page) {
  currentPage = page;
  if (sidebarOpen) toggleSidebar();
  buildSidebar();
  renderPage();
}

function buildSidebar() {
  const nav = document.getElementById('sidebarNav');
  nav.innerHTML = menuItems.map(item => `
    <button onclick="navigateTo('${item.id}')" class="w-full flex items-center gap-3 px-3 py-2.5 rounded-xl text-sm font-medium transition-colors ${currentPage===item.id ? 'bg-emerald-50 dark:bg-emerald-900/20 text-emerald-600 dark:text-emerald-400' : 'text-gray-600 dark:text-gray-400 hover:bg-gray-50 dark:hover:bg-gray-800/50'}">
      <i data-lucide="${item.icon}" class="w-4 h-4"></i>${item.label}
    </button>
  `).join('');
  lucide.createIcons();
}

function renderPage() {
  const main = document.getElementById('mainContent');
  document.getElementById('pageTitle').textContent = menuItems.find(i=>i.id===currentPage)?.label || 'Dashboard';

  if (currentPage === 'dashboard') {
    main.innerHTML = `<div class="fade-up bg-emerald-500 rounded-2xl p-6 text-white mb-6">
      <h2 class="text-2xl font-bold">Halo, Selamat Datang di Remstore!</h2>
      <p class="opacity-90">Kelola pesanan SMM kamu dengan mudah di sini.</p>
    </div>`;
  } else if (currentPage === 'new-order') {
    renderNewOrder(main);
  } else if (currentPage === 'deposit') {
    renderDeposit(main);
  } else {
    main.innerHTML = `<div class="text-center py-20 text-gray-500">Halaman ${currentPage} sedang dalam pengembangan.</div>`;
  }
  lucide.createIcons();
}

function renderNewOrder(el) {
  el.innerHTML = `
    <div class="fade-up space-y-5 max-w-2xl mx-auto">
      <div class="bg-white dark:bg-gray-900 rounded-2xl p-5 border border-gray-100 dark:border-gray-800">
        <h3 class="font-bold mb-4">Pilih Platform</h3>
        <div class="grid grid-cols-4 gap-2">
          ${platforms.map(p => `<button onclick="selectPlatform('${p.id}')" class="p-3 rounded-xl border-2 ${selectedPlatform===p.id?'border-emerald-500 bg-emerald-50':'border-transparent bg-gray-50 dark:bg-gray-800'} text-center">
            <span class="text-2xl">${p.icon}</span><p class="text-[10px] mt-1">${p.name}</p>
          </button>`).join('')}
        </div>
      </div>
      ${selectedPlatform ? `
      <form onsubmit="handleOrderSubmit(event)" class="bg-white dark:bg-gray-900 rounded-2xl p-5 border border-gray-100 dark:border-gray-800 space-y-4">
        <div>
          <label class="block text-sm font-medium mb-1">Pilih Layanan</label>
          <select id="svcSel" class="w-full p-3 rounded-xl bg-gray-50 dark:bg-gray-800 border-none outline-none" required>
            ${(services[selectedPlatform]||[]).map(s => `<option value="${s.id}">${s.name} - Rp ${s.price.toLocaleString()}</option>`).join('')}
          </select>
        </div>
        <div>
          <label class="block text-sm font-medium mb-1">Target Link/Username</label>
          <input type="text" id="targetInp" class="w-full p-3 rounded-xl bg-gray-50 dark:bg-gray-800 border-none outline-none" placeholder="Contoh: https://instagram.com/user" required>
        </div>
        <div>
          <label class="block text-sm font-medium mb-1">Jumlah</label>
          <input type="number" id="qtyInp" class="w-full p-3 rounded-xl bg-gray-50 dark:bg-gray-800 border-none outline-none" placeholder="Min 100" required>
        </div>
        <button type="submit" id="submitBtn" class="w-full bg-emerald-500 text-white py-3 rounded-xl font-bold">Kirim Pesanan</button>
      </form>` : ''}
    </div>`;
}

function renderDeposit(el) {
  el.innerHTML = `
    <div class="fade-up max-w-md mx-auto bg-white dark:bg-gray-900 rounded-2xl p-6 border border-gray-100 dark:border-gray-800 text-center">
      <h3 class="font-bold text-xl mb-4">Isi Saldo (QRIS All Payment)</h3>
      <img src="https://api.qrserver.com/v1/create-qr-code/?size=200x200&data=CONTOH_QRIS_PAYMENT" class="mx-auto mb-4 border p-2 rounded-lg" alt="QRIS">
      <p class="text-sm text-gray-500 mb-6">Silahkan scan QRIS diatas, lalu upload bukti transfer di bawah ini.</p>
      <input type="file" id="proofImg" class="block w-full text-sm text-gray-500 file:mr-4 file:py-2 file:px-4 file:rounded-full file:border-0 file:text-sm file:font-semibold file:bg-emerald-50 file:text-emerald-700 hover:file:bg-emerald-100 mb-4">
      <button onclick="handleDeposit()" class="w-full bg-emerald-500 text-white py-3 rounded-xl font-bold">Konfirmasi Deposit</button>
    </div>`;
}

function selectPlatform(id) { selectedPlatform = id; renderPage(); }

// --- API Integration ---
async function handleOrderSubmit(e) {
  e.preventDefault();
  const btn = document.getElementById('submitBtn');
  const svcId = document.getElementById('svcSel').value;
  const target = document.getElementById('targetInp').value;
  const qty = document.getElementById('qtyInp').value;
  const svc = services[selectedPlatform].find(s => s.id === svcId);

  btn.disabled = true;
  btn.innerText = "Mengirim...";

  try {
    const res = await fetch('/api/order', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ 
        service: svc.name, 
        target, 
        qty, 
        price: (qty/1000)*svc.price, 
        username: 'User_Remstore' 
      })
    });
    if(res.ok) {
      alert("Pesanan terkirim ke Telegram Admin!");
      navigateTo('dashboard');
    }
  } catch(e) { alert("Gagal mengirim pesanan."); }
  btn.disabled = false;
}

async function handleDeposit() {
  const file = document.getElementById('proofImg').files[0];
  if(!file) return alert("Pilih foto bukti transfer!");
  alert("Bukti terkirim! Admin akan memproses saldo Anda.");
  navigateTo('dashboard');
}

// --- Init ---
window.onload = () => {
  buildSidebar();
  renderPage();
};
  </script>
 </body>
</html>
