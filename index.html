<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>User Dashboard - SMM Panel</title>
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Font Awesome untuk Ikon -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    
    <style>
        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
        }
        /* Custom scrollbar untuk estetika dark mode */
        ::-webkit-scrollbar {
            width: 6px;
        }
        ::-webkit-scrollbar-track {
            background: #1f2937;
        }
        ::-webkit-scrollbar-thumb {
            background: #4b5563;
            border-radius: 3px;
        }
    </style>
</head>
<body class="bg-[#111827] text-gray-100 min-h-screen flex flex-col md:flex-row">

    <!-- SIDEBAR NAVIGASI -->
    <aside id="sidebar" class="fixed inset-y-0 left-0 z-50 w-64 bg-[#1f2937] border-r border-gray-700 transform -translate-x-full transition-transform duration-300 ease-in-out md:translate-x-0 md:static md:h-screen flex flex-col justify-between">
        <div>
            <!-- Logo / Nama Brand -->
            <div class="h-16 flex items-center justify-between px-6 border-b border-gray-700">
                <div class="flex items-center gap-2">
                    <div class="w-8 h-8 rounded-lg bg-blue-600 flex items-center justify-center font-bold text-white tracking-wider text-sm">S</div>
                    <span class="text-lg font-bold tracking-wider bg-gradient-to-r from-blue-400 to-cyan-400 bg-clip-text text-transparent">SMM PANEL</span>
                </div>
                <!-- Tombol Close Sidebar (Mobile) -->
                <button onclick="toggleSidebar()" class="md:hidden text-gray-400 hover:text-white focus:outline-none">
                    <i class="fa-solid fa-xmark text-xl"></i>
                </button>
            </div>

            <!-- Menu Item -->
            <nav class="p-4 space-y-1">
                <a href="#" class="flex items-center gap-3 px-4 py-3 text-gray-400 hover:text-white hover:bg-gray-800 rounded-xl transition duration-200">
                    <i class="fa-solid fa-chart-pie w-5"></i>
                    <span class="text-sm font-medium">Dashboard</span>
                </a>
                <a href="#" class="flex items-center gap-3 px-4 py-3 bg-blue-600 text-white rounded-xl transition duration-200 shadow-lg shadow-blue-600/20">
                    <i class="fa-solid fa-cart-plus w-5"></i>
                    <span class="text-sm font-medium">Pemesanan Baru</span>
                </a>
                <a href="#" class="flex items-center gap-3 px-4 py-3 text-gray-400 hover:text-white hover:bg-gray-800 rounded-xl transition duration-200">
                    <i class="fa-solid fa-history w-5"></i>
                    <span class="text-sm font-medium">Riwayat Pesanan</span>
                </a>
                <a href="#" class="flex items-center gap-3 px-4 py-3 text-gray-400 hover:text-white hover:bg-gray-800 rounded-xl transition duration-200">
                    <i class="fa-solid fa-wallet w-5"></i>
                    <span class="text-sm font-medium">Isi Saldo</span>
                </a>
                <a href="#" class="flex items-center gap-3 px-4 py-3 text-gray-400 hover:text-white hover:bg-gray-800 rounded-xl transition duration-200">
                    <i class="fa-solid fa-headset w-5"></i>
                    <span class="text-sm font-medium">Kontak Kami</span>
                </a>
            </nav>
        </div>

        <!-- Footer Sidebar / Akun info dasar -->
        <div class="p-4 border-t border-gray-700 bg-[#1a2232]">
            <div class="flex items-center gap-3">
                <div class="w-9 h-9 rounded-full bg-gray-600 flex items-center justify-center text-sm font-semibold text-white uppercase">
                    RU
                </div>
                <div class="overflow-hidden">
                    <p class="text-xs font-semibold text-gray-200 truncate">Rems User</p>
                    <p class="text-[10px] text-gray-400 truncate">Member Premium</p>
                </div>
            </div>
        </div>
    </aside>

    <!-- Overlay untuk Sidebar Mobile -->
    <div id="sidebar-overlay" onclick="toggleSidebar()" class="fixed inset-0 z-40 bg-black/50 hidden md:hidden"></div>

    <!-- KONTEN UTAMA -->
    <div class="flex-1 flex flex-col min-w-0">
        
        <!-- HEADER UTAMA -->
        <header class="h-16 bg-[#1f2937] border-b border-gray-700 flex items-center justify-between px-4 sm:px-6 lg:px-8">
            <!-- Tombol Menu Mobile -->
            <button onclick="toggleSidebar()" class="md:hidden text-gray-400 hover:text-white focus:outline-none p-2 rounded-lg hover:bg-gray-800">
                <i class="fa-solid fa-bars text-xl"></i>
            </button>

            <!-- Informasi Pengguna & Saldo -->
            <div class="flex items-center gap-4 ml-auto md:ml-0 w-full md:w-auto justify-end md:justify-start">
                <div class="hidden sm:block text-right">
                    <p class="text-xs text-gray-400">Selamat datang,</p>
                    <p class="text-sm font-semibold text-gray-200">Rems User</p>
                </div>
                
                <!-- Badge Saldo -->
                <div class="bg-gray-800 border border-gray-700 rounded-2xl py-1.5 px-4 flex items-center gap-3 shadow-inner">
                    <div class="w-7 h-7 rounded-full bg-emerald-500/10 flex items-center justify-center text-emerald-400">
                        <i class="fa-solid fa-wallet text-xs"></i>
                    </div>
                    <div>
                        <p class="text-[10px] text-gray-400 leading-none">Saldo Anda</p>
                        <p class="text-sm font-bold text-emerald-400 mt-0.5">Rp 500.000</p>
                    </div>
                </div>
            </div>
        </header>

        <!-- AREA KONTEN DASHBOARD -->
        <main class="flex-1 p-4 sm:p-6 lg:p-8 max-w-4xl w-full mx-auto">
            
            <!-- Breadcrumb / Judul Halaman -->
            <div class="mb-6">
                <h1 class="text-2xl font-bold text-white tracking-tight">Pemesanan Baru</h1>
                <p class="text-sm text-gray-400 mt-1">Dapatkan interaksi instan untuk optimasi media sosial Anda.</p>
            </div>

            <!-- FORM CONTAINER -->
            <div class="bg-[#1f2937] border border-gray-700 rounded-2xl shadow-xl overflow-hidden">
                <div class="p-5 border-b border-gray-700 bg-[#1a2232] flex items-center gap-2">
                    <i class="fa-solid fa-shopping-basket text-blue-400"></i>
                    <h2 class="font-semibold text-white text-sm tracking-wide">Lengkapi Detail Pesanan</h2>
                </div>

                <form class="p-6 space-y-5" onsubmit="event.preventDefault();">
                    <!-- Dropdown Kategori -->
                    <div>
                        <label for="kategori" class="block text-xs font-semibold text-gray-400 uppercase tracking-wider mb-2">Kategori Sosmed</label>
                        <div class="relative">
                            <select id="kategori" class="w-full bg-gray-800 border border-gray-700 rounded-xl py-3 px-4 text-sm text-gray-200 focus:outline-none focus:border-blue-500 focus:ring-1 focus:ring-blue-500 appearance-none cursor-pointer transition">
                                <option value="" disabled selected>Pilih Kategori...</option>
                                <option value="tiktok">TikTok Services</option>
                                <option value="instagram">Instagram Services</option>
                                <option value="youtube">YouTube Services</option>
                            </select>
                            <div class="pointer-events-none absolute inset-y-0 right-0 flex items-center px-4 text-gray-400">
                                <i class="fa-solid fa-chevron-down text-xs"></i>
                            </div>
                        </div>
                    </div>

                    <!-- Dropdown Layanan -->
                    <div>
                        <label for="layanan" class="block text-xs font-semibold text-gray-400 uppercase tracking-wider mb-2">Layanan</label>
                        <div class="relative">
                            <select id="layanan" onchange="hitungTotal()" class="w-full bg-gray-800 border border-gray-700 rounded-xl py-3 px-4 text-sm text-gray-200 focus:outline-none focus:border-blue-500 focus:ring-1 focus:ring-blue-500 appearance-none cursor-pointer transition">
                                <option value="0" disabled selected>Pilih Layanan (Pilih kategori dulu)...</option>
                                <option value="15">TikTok Followers [Max 50K] [Real] — Rp 15 / per qty</option>
                                <option value="5">TikTok Likes [Super Fast] — Rp 5 / per qty</option>
                                <option value="20">Instagram Followers [Garansi 30 Hari] — Rp 20 / per qty</option>
                            </select>
                            <div class="pointer-events-none absolute inset-y-0 right-0 flex items-center px-4 text-gray-400">
                                <i class="fa-solid fa-chevron-down text-xs"></i>
                            </div>
                        </div>
                    </div>

                    <!-- Input Link/Target -->
                    <div>
                        <label for="target" class="block text-xs font-semibold text-gray-400 uppercase tracking-wider mb-2">Link / Target</label>
                        <div class="relative">
                            <span class="absolute inset-y-0 left-0 flex items-center pl-4 text-gray-500">
                                <i class="fa-solid fa-link text-xs"></i>
                            </span>
                            <input type="url" id="target" placeholder="https://www.tiktok.com/@username atau @username" class="w-full bg-gray-800 border border-gray-700 rounded-xl py-3 pl-10 pr-4 text-sm text-gray-200 placeholder-gray-500 focus:outline-none focus:border-blue-500 focus:ring-1 focus:ring-blue-500 transition">
                        </div>
                    </div>

                    <!-- Input Jumlah & Total Harga Side by Side -->
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-5">
                        <!-- Kolom Jumlah -->
                        <div>
                            <label for="jumlah" class="block text-xs font-semibold text-gray-400 uppercase tracking-wider mb-2">Jumlah (Qty)</label>
                            <div class="relative">
                                <span class="absolute inset-y-0 left-0 flex items-center pl-4 text-gray-500">
                                    <i class="fa-solid fa-arrow-up-1-9 text-xs"></i>
                                </span>
                                <input type="number" id="jumlah" oninput="hitungTotal()" min="1" placeholder="Masukkan nominal jumlah..." class="w-full bg-gray-800 border border-gray-700 rounded-xl py-3 pl-10 pr-4 text-sm text-gray-200 placeholder-gray-500 focus:outline-none focus:border-blue-500 focus:ring-1 focus:ring-blue-500 transition">
                            </div>
                        </div>

                        <!-- Box Otomatis Total Harga -->
                        <div>
                            <label class="block text-xs font-semibold text-gray-400 uppercase tracking-wider mb-2">Total Harga</label>
                            <div class="bg-gray-800/60 border border-dashed border-gray-700 rounded-xl py-3 px-4 flex items-center justify-between h-[46px]">
                                <span class="text-xs text-gray-400">Estimasi Biaya</span>
                                <span id="total-harga" class="text-base font-bold text-cyan-400">Rp 0</span>
                            </div>
                        </div>
                    </div>

                    <!-- Tombol Submit -->
                    <button type="submit" class="w-full bg-gradient-to-r from-blue-600 to-cyan-600 hover:from-blue-500 hover:to-cyan-500 text-white font-semibold text-sm py-3.5 px-4 rounded-xl transition duration-200 transform active:scale-[0.99] shadow-lg shadow-blue-600/20 mt-2 flex items-center justify-center gap-2">
                        <i class="fa-solid fa-paper-plane text-xs"></i> Submit Pesanan
                    </button>
                </form>
            </div>
        </main>
    </div>

    <!-- JAVASCRIPT LOGIC -->
    <script>
        // Fungsi Toggle Sidebar pada Layar Mobile
        function toggleSidebar() {
            const sidebar = document.getElementById('sidebar');
            const overlay = document.getElementById('sidebar-overlay');
            
            sidebar.classList.toggle('-translate-x-full');
            overlay.classList.toggle('hidden');
        }

        // Kalkulator Otomatis Hitung Total Harga
        function hitungTotal() {
            const hargaPerQty = parseFloat(document.getElementById('layanan').value) || 0;
            const jumlah = parseInt(document.getElementById('jumlah').value) || 0;
            
            const total = hargaPerQty * jumlah;
            
            // Format angka ke format Rupiah standar rupiah Indonesia
            const formatter = new Intl.NumberFormat('id-ID', {
                style: 'currency',
                currency: 'IDR',
                minimumFractionDigits: 0
            });
            
            document.getElementById('total-harga').innerText = formatter.format(total);
        }
    </script>
</body>
</html>
